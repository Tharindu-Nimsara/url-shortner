version: "3.8"

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://snaplink.gleeze.com}
    depends_on:
      - redis

  frontend:
    build: ./client
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://snaplink.gleeze.com:5000}
    ports:
      - "80:80"
    depends_on:
      - backend
